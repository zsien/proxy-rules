name: Generate Geo Lists

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: release
          path: release

      - uses: actions/checkout@v4
        with:
          repository: MetaCubeX/meta-rules-dat
          ref: sing
          path: meta-rules-dat

      - name: Convert sing geo JSON to list
        run: |
          set -euo pipefail

          rm -rf release/geo
          mkdir -p release/geo

          for kind in geoip geosite; do
            src_root="meta-rules-dat/geo/${kind}"
            dst_root="release/geo/${kind}"

            if [ ! -d "${src_root}" ]; then
              echo "::error::Source directory not found: ${src_root}"
              exit 1
            fi

            find "${src_root}" -type f -name '*.json' -print0 | while IFS= read -r -d '' json_file; do
              rel_path="${json_file#${src_root}/}"
              out_file="${dst_root}/${rel_path%.json}.list"

              mkdir -p "$(dirname "${out_file}")"

              if [ "${kind}" = "geoip" ]; then
                jq -r '.rules[]? | .ip_cidr[]?' "${json_file}" > "${out_file}"
                expected_key="ip_cidr"
              else
                jq -r '.rules[]? | .domain_suffix[]?' "${json_file}" > "${out_file}"
                expected_key="domain_suffix"
              fi

              top_extra_keys="$(jq -r 'objects | keys_unsorted[]? | select(. != "rules")' "${json_file}" | sort -u | paste -sd ',' -)"
              rule_extra_keys="$(jq -r --arg expected "${expected_key}" '.rules[]? | objects | keys_unsorted[]? | select(. != $expected)' "${json_file}" | sort -u | paste -sd ',' -)"

              if [ -n "${top_extra_keys}" ]; then
                echo "::notice file=${json_file}::Top-level extra keys: ${top_extra_keys}"
              fi

              if [ -n "${rule_extra_keys}" ]; then
                echo "::notice file=${json_file}::Rule extra keys: ${rule_extra_keys}"
              fi
            done
          done

      - name: Commit and push changes
        run: |
          pushd release

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[automated commit] Regenerate geo lists $(date +%Y%m%d%H%M)"
          git push

          popd
