name: Generate Geo Lists

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: release
          path: release

      - uses: actions/checkout@v4
        with:
          repository: MetaCubeX/meta-rules-dat
          ref: sing
          path: meta-rules-dat

      - name: Convert sing geo JSON to list
        run: |
          set -euo pipefail

          rm -rf release/geo
          mkdir -p release/geo

          for kind in geoip geosite; do
            src_root="meta-rules-dat/geo/${kind}"
            dst_root="release/geo/${kind}"

            if [ ! -d "${src_root}" ]; then
              echo "::error::Source directory not found: ${src_root}"
              exit 1
            fi

            find "${src_root}" -type f -name '*.json' -print0 | while IFS= read -r -d '' json_file; do
              rel_path="${json_file#${src_root}/}"
              rel_no_ext="${rel_path%.json}"

              if [ "${kind}" = "geoip" ]; then
                out_file_v4="${dst_root}/${rel_no_ext}.ip.list"
                out_file_v6="${dst_root}/${rel_no_ext}.ip6.list"

                mkdir -p "$(dirname "${out_file_v4}")"

                jq -r '.rules[]? | .ip_cidr[]? | select(type == "string") | select(test(":") | not)' "${json_file}" > "${out_file_v4}"
                jq -r '.rules[]? | .ip_cidr[]? | select(type == "string") | select(test(":"))' "${json_file}" > "${out_file_v6}"
              else
                out_file="${dst_root}/${rel_no_ext}.list"

                mkdir -p "$(dirname "${out_file}")"

                jq -r '
                  .rules[]? |
                  (.domain_suffix[]?),
                  (.domain[]? | "-." + .)
                ' "${json_file}" > "${out_file}"
                expected_keys_json='["domain_suffix","domain"]'
              fi

              top_extra_keys="$(jq -r 'objects | keys_unsorted[]? | select(. != "rules" and . != "version")' "${json_file}" | sort -u | paste -sd ',' -)"
              if [ "${kind}" = "geoip" ]; then
                rule_extra_keys="$(jq -r '.rules[]? | objects | keys_unsorted[]? | select(. != "ip_cidr")' "${json_file}" | sort -u | paste -sd ',' -)"
              else
                rule_extra_keys="$(jq -r --argjson expected "${expected_keys_json}" '.rules[]? | objects | keys_unsorted[]? | select((. as $k | $expected | index($k)) | not)' "${json_file}" | sort -u | paste -sd ',' -)"
              fi

              if [ -n "${top_extra_keys}" ]; then
                echo "::notice file=${json_file}::[${rel_path}] Top-level extra keys: ${top_extra_keys}"
              fi

              if [ -n "${rule_extra_keys}" ]; then
                echo "::notice file=${json_file}::[${rel_path}] Rule extra keys: ${rule_extra_keys}"
              fi
            done
          done

      - name: Commit and push changes
        run: |
          pushd release

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[automated commit] Regenerate geo lists $(date +%Y%m%d%H%M)"
          git push

          popd
